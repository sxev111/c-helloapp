name: Build C++ to EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest  # Uses a Windows environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile C++
        run: g++ main.cpp -o my_program.exe  # Compiles your code into an .exe

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: my_program.exe  # Makes the .exe downloadable from 